name: Deploy Supabase (schema.sql + functions)

on:
  push:
    branches: [ "main" ]
    paths:
      - "supabase/schema.sql"
      - "supabase/functions/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      # Aplica schema.sql tal cual (sin carpeta migrations)
      - name: Apply SQL schema
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"

      # Deploy de todas las Edge Functions
      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"

      # Secret de reCAPTCHA (opcional)
      - name: Set reCAPTCHA secret (optional)
        if: ${{ secrets.RECAPTCHA_SECRET != '' }}
        run: |
          supabase secrets set reCAPTCHA_secret="${{ secrets.RECAPTCHA_SECRET }}" --project-ref "$SUPABASE_PROJECT_REF"
